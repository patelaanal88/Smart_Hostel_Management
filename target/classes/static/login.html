<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Hostel Management</title>
    <link rel="stylesheet" href="login-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 400px; text-align: center; }
        .modal input:disabled { background: #f1f5f9; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <div class="login-header">
            <div class="icon-box"><i class='bx bxs-user-circle'></i></div>
            <h1>Welcome Back</h1>
            <p>Login to access your hostel dashboard</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="login-id">Registration / Identification Number</label>
                <div class="field">
                    <i class='bx bx-id-card'></i>
                    <input type="text" id="login-id" placeholder="e.g., ST1234 or AD1234" required>
                </div>
            </div>

            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="field">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div style="text-align: right; margin-top: 5px;">
                    <a href="#" onclick="openForgotModal()" style="font-size: 12px; color: #10b981; text-decoration: none; font-weight: 600;">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="login-btn">Sign In <i class='bx bx-right-arrow-alt'></i></button>

            <div class="form-footer">
                <p>Don't have an account? <a href="index.html">Sign Up here</a></p>
            </div>
        </form>
    </div>
</div>

<div id="forgotModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 10px;">Reset Access</h2>
        <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Verification code will be sent to your Gmail</p>

        <input type="email" id="resetEmail" class="styled-input" placeholder="Enter Registered Email" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1.5px solid #e2e8f0;">
        <button onclick="sendCode()" id="sendBtn" class="login-btn">Send Code</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <input type="text" id="verifyCode" disabled class="styled-input" placeholder="5-Digit Code" maxlength="5" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1.5px solid #e2e8f0;">
        <button onclick="submitVerify()" id="verifyBtn" disabled class="login-btn" style="background: #64748b;">Verify & Login</button>

        <button onclick="closeForgotModal()" style="background: none; border: none; margin-top: 15px; color: #94a3b8; cursor: pointer;">Cancel</button>
    </div>
</div>

<script>
    // Keeping handleLogin logic identical to your script.js but added here for the flow
    async function handleLogin(e) {
        e.preventDefault();
        const body = { username: document.getElementById('login-id').value, password: document.getElementById('login-password').value };
        const res = await fetch('http://localhost:8080/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            const user = await res.json();
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = user.role === 'ADMIN' ? 'admin_dashboard.html' : 'student_dashboard.html';
        } else {
            Swal.fire("Error", "Invalid Credentials", "error");
        }
    }

    // FORGOT PASSWORD FLOW
    function openForgotModal() { document.getElementById('forgotModal').style.display = 'flex'; }
    function closeForgotModal() { document.getElementById('forgotModal').style.display = 'none'; }

    async function sendCode() {
        const email = document.getElementById('resetEmail').value;
        if(!email) return Swal.fire("Required", "Please enter your email", "warning");

        const res = await fetch('http://localhost:8080/api/auth/send-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });

        if(res.ok) {
            Swal.fire("Sent", "Verification code sent to Gmail", "success");
            document.getElementById('verifyCode').disabled = false;
            document.getElementById('verifyBtn').disabled = false;
            document.getElementById('verifyBtn').style.background = '#10b981';
            document.getElementById('resetEmail').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        } else {
            const msg = await res.text();
            Swal.fire("Error", msg, "error");
        }
    }

    async function submitVerify() {
        const email = document.getElementById('resetEmail').value;
        const code = document.getElementById('verifyCode').value;

        const res = await fetch('http://localhost:8080/api/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, code: code })
        });

        if(res.ok) {
            const user = await res.json();
            localStorage.setItem('currentUser', JSON.stringify(user));
            Swal.fire("Verified", "Redirecting...", "success");
            setTimeout(() => {
                window.location.href = user.role === 'ADMIN' ? 'admin_dashboard.html' : 'student_dashboard.html';
            }, 1500);
        } else {
            Swal.fire("Failed", "Incorrect verification code", "error");
        }
    }
</script>
</body>
</html>
